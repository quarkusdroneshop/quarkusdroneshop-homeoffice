apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: quarkusdroneshop-homeoffice
  description: バックヤード業務のマイクロサービスです
  tags:
    - latest
    - c-cluster
  labels:
    app: homeoffice
  annotations:
    github.com/project-slug: quarkusdroneshop/quarkusdroneshop-homeoffice
    backstage.io/kubernetes-id: quarkusdroneshop-homeoffice
    backstage.io/kubernetes-cluster: c-cluster
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=homeoffice-backend
    argocd/app-selector: app.kubernetes.io/instance=quarkusdroneshop-homeoffice
    tekton.dev/type: pipeline
    rhdh.redhat.com/tekton-enabled: "true"
    tektonci.io/pipeline: build-and-push-quarkusdroneshop-homeoffice
    tektonci.io/pipelineNamespace: quarkusdroneshop-cicd
    tekton.dev/cicd: "true"
    janus-idp.io/tekton: "true"
spec:
  type: microservice
  owner: user:default/nmushino
  lifecycle: production
  system: c-cluster
  dependsOn:
    - resource:droneshopdb-postgresql
    - resource:shop-cluster-kafka
    - resource:shop-asite-orders-in
    - resource:shop-bsite-orders-up
    - resource:shop-asite-loyalty-updates
  consumesApis:
    - kafka-shop-asite-orders-in
    - kafka-shop-bsite-orders-up
    - kafka-shop-asite-loyalty-updates
  providesApis:
    - quarkusdroneshop-homeoffice-graphql
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: kafka-shop-asite-orders-in
  description: "Kafka トピック: shop-asite.orders-in（注文チケット受信）"
  annotations:
    backstage.io/kubernetes-cluster: b-cluster
spec:
  type: asyncapi
  lifecycle: production
  owner: user:default/nmushino
  system: b-cluster
  definition: |
    asyncapi: 2.6.0
    info:
      title: shop-asite.orders-in
      version: 1.0.0
      description: ドローンショップ注文チケット受信トピック
    servers:
      production:
        url: shop-cluster-kafka-bootstrap:9092
        protocol: kafka
    channels:
      shop-asite.orders-in:
        description: 注文チケットを受信するトピック
        subscribe:
          operationId: receiveOrder
          message:
            name: OrderTicket
            contentType: application/json
            payload:
              type: object
              properties:
                orderId:
                  type: string
                item:
                  type: string
                quantity:
                  type: integer
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: kafka-shop-bsite-orders-up
  description: "Kafka トピック: shop-bsite.orders-up（注文ステータス更新）"
  annotations:
    backstage.io/kubernetes-cluster: b-cluster
spec:
  type: asyncapi
  lifecycle: production
  owner: user:default/nmushino
  system: b-cluster
  definition: |
    asyncapi: 2.6.0
    info:
      title: shop-bsite.orders-up
      version: 1.0.0
      description: 注文ステータス更新トピック
    servers:
      production:
        url: shop-cluster-kafka-bootstrap:9092
        protocol: kafka
    channels:
      shop-bsite.orders-up:
        description: 注文ステータス更新を受信するトピック
        subscribe:
          operationId: receiveOrderUpdate
          message:
            name: OrderUpdate
            contentType: application/json
            payload:
              type: object
              properties:
                orderId:
                  type: string
                status:
                  type: string
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: kafka-shop-asite-loyalty-updates
  description: "Kafka トピック: shop-asite.loyalty-updates（ロイヤリティ更新）"
  annotations:
    backstage.io/kubernetes-cluster: b-cluster
spec:
  type: asyncapi
  lifecycle: production
  owner: user:default/nmushino
  system: b-cluster
  definition: |
    asyncapi: 2.6.0
    info:
      title: shop-asite.loyalty-updates
      version: 1.0.0
      description: ロイヤリティポイント更新トピック
    servers:
      production:
        url: shop-cluster-kafka-bootstrap:9092
        protocol: kafka
    channels:
      shop-asite.loyalty-updates:
        description: ロイヤリティ更新情報を受信するトピック
        subscribe:
          operationId: receiveLoyaltyUpdate
          message:
            name: LoyaltyUpdate
            contentType: application/json
            payload:
              type: object
              properties:
                customerId:
                  type: string
                points:
                  type: integer
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: quarkusdroneshop-homeoffice-graphql
  description: "homeoffice バックヤード業務 GraphQL API"
  annotations:
    backstage.io/kubernetes-cluster: c-cluster
spec:
  type: graphql
  lifecycle: production
  owner: user:default/nmushino
  system: c-cluster
  definition: |
    type Query {
      """指定ロケーションの注文一覧を取得"""
      ordersForLocation(location: String!): [Order]

      """全ロケーションの注文集計を取得"""
      getOrdersByLocation: [LocationOrders]

      """全商品の販売実績を取得"""
      getItemSales: [ItemSales]

      """日付範囲で商品別日次販売実績を取得"""
      getProductSalesByDate(startDate: String!, endDate: String!): [ProductSales]

      """日付範囲で商品別売上合計を取得"""
      getItemSalesTotalsByDate(startDate: String!, endDate: String!): [ItemSales]

      """全ロケーション・スタッフ別販売実績を取得"""
      getStoreServerSales: [StoreServerSales]

      """日付範囲でロケーション・スタッフ別販売実績を取得"""
      getStoreServerSalesByDate(startDate: String!, endDate: String!): [StoreServerSales]

      """日付範囲の平均注文処理時間を取得（ミリ秒）"""
      getAverageOrderUpTime(startDate: String!, endDate: String!): Int
    }

    type Order {
      orderId: String
      location: String
      loyaltyMemberId: String
      externalOrderId: String
      item: String
      orderPlacedTimestamp: String
      orderCompletedTimestamp: String
      lineItems: [LineItem]
      total: Float
    }

    type LineItem {
      item: String
      price: Float
      preparedBy: String
    }

    type LocationOrders {
      location: String
      orders: [Order]
    }

    type ItemSales {
      item: String
      salesTotal: Int
      price: Float
      revenue: Float
    }

    type ProductSales {
      item: String
      productItemSales: [ProductItemSales]
    }

    type ProductItemSales {
      item: String
      saleDate: String
      salesTotal: Float
      revenue: Float
    }

    type StoreServerSales {
      store: String
      server: String
      itemSales: [ItemSales]
    }
