mp.messaging.incoming.sales-trends-daily.group.id=homeoffice-backend-sales-trends-daily-${HOSTNAME:local}
mp.messaging.incoming.sales-trends-daily.auto.offset.reset=earliest
%prod.mp.messaging.incoming.sales-trends-daily.apicurio.registry.url=http://droneshop-apicurioregistry-kafkasql.quarkusdroneshop-demo.router-default.apps.ocp.zgjl6.sandbox780.opentlc.com/apis/registry/v2

