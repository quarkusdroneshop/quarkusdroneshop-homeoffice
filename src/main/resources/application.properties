%prod.mp.messaging.incoming.lead-time-qdca10pro.apicurio.registry.url=http://droneshop-apicurioregistry-kafkasql.quarkusdroneshop-demo.router-default.apps.ocp.zgjl6.sandbox780.opentlc.com/apis/registry/v2

