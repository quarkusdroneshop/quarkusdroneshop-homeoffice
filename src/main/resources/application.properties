## 稼働する Flink ジョブが発行するため、orders-created と同じく csite の MirrorMaker2 が
## ミラーした shop-asite.* トピックを、シリアライズ元である asite の Apicurio Registry で読む。
mp.messaging.incoming.sales-trends-5m.connector=smallrye-kafka
mp.messaging.incoming.sales-trends-5m.topic=shop-asite.dataproduct-sales-trends-5m
mp.messaging.incoming.sales-trends-5m.bootstrap.servers=${KAFKA_BOOTSTRAP_URLS}
mp.messaging.incoming.sales-trends-5m.value.deserializer=io.quarkusdroneshop.homeoffice.infrastructure.GenericRecordAvroDeserializer
mp.messaging.incoming.sales-trends-5m.group.id=homeoffice-backend-sales-trends-5m-${HOSTNAME:local}
mp.messaging.incoming.sales-trends-5m.auto.offset.reset=earliest
%prod.mp.messaging.incoming.sales-trends-5m.apicurio.registry.url=http://droneshop-apicurioregistry-kafkasql.quarkusdroneshop-demo.router-default.apps.ocp.zgjl6.sandbox780.opentlc.com/apis/registry/v2

