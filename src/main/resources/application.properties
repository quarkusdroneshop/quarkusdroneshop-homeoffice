## Order Retry (DLQ の Retry ボタンから実際に Kafka へ再送し、In Queue に戻す)
mp.messaging.outgoing.order-retry-out.connector=smallrye-kafka
mp.messaging.outgoing.order-retry-out.topic=homeoffice-orders-retry
%dev.mp.messaging.outgoing.order-retry-out.bootstrap.servers=localhost:9092
mp.messaging.outgoing.order-retry-out.bootstrap.servers=${KAFKA_BOOTSTRAP_URLS}
mp.messaging.outgoing.order-retry-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.incoming.order-retry-in.connector=smallrye-kafka
mp.messaging.incoming.order-retry-in.topic=homeoffice-orders-retry
%dev.mp.messaging.incoming.order-retry-in.bootstrap.servers=localhost:9092
mp.messaging.incoming.order-retry-in.bootstrap.servers=${KAFKA_BOOTSTRAP_URLS}
mp.messaging.incoming.order-retry-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.order-retry-in.auto.offset.reset=latest

## Retry で本当に注文処理パイプラインへ戻すため、qdca10/qdca10pro の実物理端末が
## 消費する asite の qdca10-in / qdca10pro-in トピックへ直接 publish する。
## homeoffice は csite で稼働しているため、これらは csite ローカルの
## shop-cluster-kafka-bootstrap ではなく、asite の外部リスナー (PLAINTEXT) を指す。
mp.messaging.outgoing.qdca10-retry-out.connector=smallrye-kafka
mp.messaging.outgoing.qdca10-retry-out.topic=qdca10-in
%dev.mp.messaging.outgoing.qdca10-retry-out.bootstrap.servers=localhost:9092
mp.messaging.outgoing.qdca10-retry-out.bootstrap.servers=${ASITE_KAFKA_EXTERNAL_BOOTSTRAP_URLS}
mp.messaging.outgoing.qdca10-retry-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.outgoing.qdca10pro-retry-out.connector=smallrye-kafka
mp.messaging.outgoing.qdca10pro-retry-out.topic=qdca10pro-in
%dev.mp.messaging.outgoing.qdca10pro-retry-out.bootstrap.servers=localhost:9092
mp.messaging.outgoing.qdca10pro-retry-out.bootstrap.servers=${ASITE_KAFKA_EXTERNAL_BOOTSTRAP_URLS}
mp.messaging.outgoing.qdca10pro-retry-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

