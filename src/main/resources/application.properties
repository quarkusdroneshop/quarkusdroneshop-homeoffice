# Locations
%dev.locations=${STORE_LOCATIONS}
%test.locations=ATLANTA,RALEIGH,CHARLOTTE,TOKYO
%prod.locations=${STORE_LOCATIONS}

# Datasource
quarkus.datasource.db-kind=postgresql

%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/droneshopdb?sslmode=disable
%dev.quarkus.hibernate-orm.database.default-schema=droneshop
# %test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/droneshopdb?currentSchema=droneshop
quarkus.datasource.jdbc.max-size=16
%dev.quarkus.datasource.username=droneshopadmin
%dev.quarkus.datasource.password=postgres
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%dev.quarkus.kafka.devservices.enabled=false
#quarkus.hibernate-orm.database.generation=none
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.schemas=public
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.flyway.baseline-on-migrate=true
%prod.quarkus.flyway.baseline-version=1
%dev.quarkus.hibernate-orm.database.default-schema=droneshop

%prod.quarkus.datasource.jdbc.url=${POSTGRESQL_JDBC_URL}
%prod.quarkus.datasource.username=${POSTGRESQL_USER}
%prod.quarkus.datasource.password=${POSTGRESQL_PASSWORD}

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:default;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.log.sql=true
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

quarkus.hibernate-orm.log.sql=false
%prod.quarkus.hibernate-orm.schema-management.strategy=update
%prod.quarkus.hibernate-orm.database.default-schema=droneshop
%prod.quarkus.hibernate-orm.schema-management.create-schemas=true

# PORT
quarkus.http.port=8080
%dev.quarkus.http.port=9090

# Logging
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
#quarkus.log.console.format=%-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."io.quarkusdroneshop".level=DEBUG

## Kafka global bootstrap (Kafka health check が参照するグローバル設定)
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_URLS}
%dev.kafka.bootstrap.servers=localhost:9092
%test.kafka.bootstrap.servers=localhost:9092

## Orders
mp.messaging.incoming.orders-created.connector=smallrye-kafka
mp.messaging.incoming.orders-created.topic=shop-asite.orders-in
%dev.mp.messaging.incoming.orders-created.bootstrap.servers=localhost:9092
mp.messaging.incoming.orders-created.bootstrap.servers=${KAFKA_BOOTSTRAP_URLS}
mp.messaging.incoming.orders-created.value.deserializer=io.quarkusdroneshop.homeoffice.infrastructure.OrderRecordDeserializer
mp.messaging.incoming.orders-created.auto.offset.reset=earliest

mp.messaging.incoming.orders-updated.connector=smallrye-kafka
mp.messaging.incoming.orders-updated.topic=shop-bsite.orders-up
%dev.mp.messaging.incoming.orders-updated.bootstrap.servers=localhost:9092
mp.messaging.incoming.orders-updated.bootstrap.servers=${KAFKA_BOOTSTRAP_URLS}
mp.messaging.incoming.orders-updated.value.deserializer=io.quarkusdroneshop.homeoffice.infrastructure.OrderUpMessageDeserializer
mp.messaging.incoming.orders-updated.auto.offset.reset=earliest

mp.messaging.incoming.loyalty-member-purchase.connector=smallrye-kafka
mp.messaging.incoming.loyalty-member-purchase.topic=shop-asite.loyalty-updates
%dev.mp.messaging.incoming.loyalty-member-purchase.bootstrap.servers=localhost:9092
mp.messaging.incoming.loyalty-member-purchase.bootstrap.servers=${KAFKA_BOOTSTRAP_URLS}
mp.messaging.incoming.loyalty-member-purchase.value.deserializer=io.quarkusdroneshop.homeoffice.infrastructure.OrderRecordDeserializer

## Order Retry (DLQ の Retry ボタンから実際に Kafka へ再送し、In Queue に戻す)
mp.messaging.outgoing.order-retry-out.connector=smallrye-kafka
mp.messaging.outgoing.order-retry-out.topic=homeoffice-orders-retry
%dev.mp.messaging.outgoing.order-retry-out.bootstrap.servers=localhost:9092
mp.messaging.outgoing.order-retry-out.bootstrap.servers=${KAFKA_BOOTSTRAP_URLS}
mp.messaging.outgoing.order-retry-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.incoming.order-retry-in.connector=smallrye-kafka
mp.messaging.incoming.order-retry-in.topic=homeoffice-orders-retry
%dev.mp.messaging.incoming.order-retry-in.bootstrap.servers=localhost:9092
mp.messaging.incoming.order-retry-in.bootstrap.servers=${KAFKA_BOOTSTRAP_URLS}
mp.messaging.incoming.order-retry-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.order-retry-in.auto.offset.reset=latest

## Retry で本当に注文処理パイプラインへ戻すため、qdca10/qdca10pro の実物理端末が
## 消費する asite の qdca10-in / qdca10pro-in トピックへ直接 publish する。
## homeoffice は csite で稼働しているため、これらは csite ローカルの
## shop-cluster-kafka-bootstrap ではなく、asite の外部リスナー (PLAINTEXT) を指す。
mp.messaging.outgoing.qdca10-retry-out.connector=smallrye-kafka
mp.messaging.outgoing.qdca10-retry-out.topic=qdca10-in
%dev.mp.messaging.outgoing.qdca10-retry-out.bootstrap.servers=localhost:9092
mp.messaging.outgoing.qdca10-retry-out.bootstrap.servers=${ASITE_KAFKA_EXTERNAL_BOOTSTRAP_URLS}
mp.messaging.outgoing.qdca10-retry-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.outgoing.qdca10pro-retry-out.connector=smallrye-kafka
mp.messaging.outgoing.qdca10pro-retry-out.topic=qdca10pro-in
%dev.mp.messaging.outgoing.qdca10pro-retry-out.bootstrap.servers=localhost:9092
mp.messaging.outgoing.qdca10pro-retry-out.bootstrap.servers=${ASITE_KAFKA_EXTERNAL_BOOTSTRAP_URLS}
mp.messaging.outgoing.qdca10pro-retry-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

#allow CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=false

#Tests
quarkus.kafka.devservices.enabled=false

#graphql-ui
quarkus.smallrye-graphql.ui.always-include=true
# Test profile: use in-memory connector instead of Kafka
%test.mp.messaging.incoming.orders-created.connector=smallrye-in-memory
%test.mp.messaging.incoming.orders-updated.connector=smallrye-in-memory
%test.mp.messaging.incoming.loyalty-member-purchase.connector=smallrye-in-memory
%test.mp.messaging.outgoing.order-retry-out.connector=smallrye-in-memory
%test.mp.messaging.incoming.order-retry-in.connector=smallrye-in-memory
%test.mp.messaging.outgoing.qdca10-retry-out.connector=smallrye-in-memory
%test.mp.messaging.outgoing.qdca10pro-retry-out.connector=smallrye-in-memory
%test.kafka.bootstrap.servers=localhost:9092

# Jandex index for in-memory connector
quarkus.index-dependency.smallrye-in-memory.group-id=io.smallrye.reactive
quarkus.index-dependency.smallrye-in-memory.artifact-id=smallrye-reactive-messaging-in-memory

# Health Check
quarkus.smallrye-health.ui.always-include=true
quarkus.kafka.health.enabled=true
